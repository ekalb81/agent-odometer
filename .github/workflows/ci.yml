name: CI

# Runs the fast validation path on every PR and on pushes to main. Verifies that:
#   - the frontend type-checks (svelte-check)
#   - the frontend builds (vite build)
#   - the Rust crate is formatted and passes strict Clippy
#   - all Rust tests pass (cargo test)
# Main pushes and manual runs also verify the declared MSRV and measure Rust
# test coverage. Coverage uploads to Codecov using GitHub OIDC and are only
# functional while the repository is public.
#
# Runs on Linux only — these checks are platform-independent and Linux is
# the fastest GitHub-hosted runner. The release workflow handles the
# multi-OS bundle build.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  # Lets the Codecov upload authenticate via GitHub OIDC instead of a token.
  id-token: write

# Cancel in-progress runs when a new commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check + test
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ci-linux

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libssl-dev \
            build-essential \
            pkg-config

      - name: Install frontend deps
        run: npm ci

      - name: Frontend type-check
        run: npm run check

      - name: Frontend build
        run: npm run build

      - name: Rust format check
        working-directory: ./src-tauri
        run: cargo fmt --check

      - name: Rust lint (clippy)
        working-directory: ./src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Rust tests
        working-directory: ./src-tauri
        shell: bash
        run: |
          set -o pipefail
          cargo test --locked 2>&1 | tee test-output.txt

      - name: Test summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Rust test results"
            echo
            echo '| Suite | Result |'
            echo '| --- | --- |'
            awk '/^     Running |^   Doc-tests / { suite=$2; sub(/\(.*/, "", suite) }
                 /^test result:/ { gsub(/;/, "", $0); printf("| `%s` | %s passed, %s failed |\n", suite, $4, $6) }' \
              src-tauri/test-output.txt
          } >> "$GITHUB_STEP_SUMMARY"

  msrv:
    name: Minimum supported Rust 1.88
    # PRs already exercise the same source with stable Rust. Keep the slower
    # compatibility build on main and explicit runs, where it still catches
    # accidental MSRV drift without charging every intermediate PR commit.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust 1.88
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: msrv-linux-1.88

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libssl-dev \
            build-essential \
            pkg-config

      - name: Check declared MSRV
        working-directory: ./src-tauri
        run: cargo check --locked

  coverage:
    name: Coverage
    # Coverage is informational (the upload is intentionally non-blocking), so
    # publish it once changes land rather than rebuilding every PR revision.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: coverage-linux

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libssl-dev \
            build-essential \
            pkg-config

      - name: Coverage
        working-directory: ./src-tauri
        shell: bash
        run: |
          cargo llvm-cov --locked --lcov --output-path lcov.info
          {
            echo "## Rust coverage"
            echo
            echo '```'
            cargo llvm-cov report --summary-only
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          files: src-tauri/lcov.info
          use_oidc: true
          fail_ci_if_error: false
