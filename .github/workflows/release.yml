name: Release

# Triggers a cross-platform Tauri build when you push a tag like `v0.1.0`.
# Produces installers for Windows (MSI + NSIS), macOS arm64 (DMG), and Linux
# (deb + AppImage), and attaches them to a DRAFT GitHub Release that you
# review and publish manually.
#
# Manual trigger (workflow_dispatch) is a build-only dry run. It never derives
# a release tag from the selected branch and never creates or uploads a release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preflight:
    name: Verify release versions
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify package versions and release tag
        shell: bash
        run: |
          set -euo pipefail

          package_version="$(node -e 'const fs = require("node:fs"); process.stdout.write(JSON.parse(fs.readFileSync("package.json", "utf8")).version)')"
          tauri_version="$(node -e 'const fs = require("node:fs"); process.stdout.write(JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8")).version)')"
          cargo_version="$(awk -F '=' '
            /^\[package\][[:space:]]*$/ { in_package = 1; next }
            /^\[/ { if (in_package) exit }
            in_package && $1 ~ /^[[:space:]]*version[[:space:]]*$/ {
              value = $2
              gsub(/[[:space:]"]/, "", value)
              print value
              exit
            }
          ' src-tauri/Cargo.toml)"

          if [[ -z "$package_version" || -z "$cargo_version" || -z "$tauri_version" ]]; then
            echo "::error::Could not read all release versions"
            exit 1
          fi

          if [[ "$package_version" != "$cargo_version" || "$package_version" != "$tauri_version" ]]; then
            echo "::error::Version mismatch: package.json=$package_version Cargo.toml=$cargo_version tauri.conf.json=$tauri_version"
            exit 1
          fi

          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            expected_tag="v${package_version}"
            if [[ "$GITHUB_REF_TYPE" != "tag" || "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
              echo "::error::Release tag '$GITHUB_REF_NAME' must exactly match '$expected_tag'"
              exit 1
            fi
          fi

          echo "Release version verified: $package_version"

  build:
    name: ${{ matrix.platform }} — ${{ matrix.label }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS (Apple Silicon)
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            label: Linux (x86_64)
            args: ''
            rust_target: ''
          - platform: windows-latest
            label: Windows (x86_64)
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          # Make sure caches are scoped per OS+target.
          key: ${{ matrix.platform }}-${{ matrix.rust_target }}

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libssl-dev \
            build-essential \
            pkg-config \
            patchelf \
            file

      - name: Install frontend deps
        run: npm ci

      - name: Build and bundle (manual dry run; no release upload)
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          # createUpdaterArtifacts is enabled, so dry runs still exercise the
          # updater-signing path while keeping every artifact local to the job.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}

      - name: Build, bundle, and upload to draft release
        if: github.event_name == 'push'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater artifact signing (minisign). tauri-action also assembles
          # and uploads latest.json for the in-app updater when these are set.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Odometer ${{ github.ref_name }}'
          releaseBody: |
            ## Installation

            Download the installer for your platform:

            - **Windows**: the `.msi` (recommended) or `.exe`.
            - **macOS (Apple Silicon)**: the `.dmg`. Right-click → Open on first launch (the app isn't notarized yet).
            - **Linux**: the `.AppImage` (single file, no install) or `.deb` (Debian/Ubuntu).

            Installed copies check for new releases on launch and offer a one-click update.

            ## Changes

            <!-- Fill in release notes before publishing. -->
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
